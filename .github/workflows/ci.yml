name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome lint
        run: pnpm biome lint .
      - name: TypeScript check
        run: pnpm tsc --noEmit
        continue-on-error: true
      - name: Tests
        run: pnpm vitest run --passWithNoTests
        if: hashFiles('vitest.config.*') != ''

  notify-slack-pr:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'
    steps:
      - name: Get Vercel preview deployment
        id: vercel
        run: |
          sleep 30
          DEPLOY=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | jq -r '.deployments[0]')
          echo "url=$(echo $DEPLOY | jq -r '.url')" >> $GITHUB_OUTPUT
          echo "state=$(echo $DEPLOY | jq -r '.state // .readyState')" >> $GITHUB_OUTPUT

      - name: Notify Slack (staging)
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<'PAYLOAD'
          {
            "channel": "C0AQPJNUQEL",
            "text": "🔀 *Micelio PR preview ready*",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🔀 Micelio — PR Preview" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}>" },
                  { "type": "mrkdwn", "text": "*Author:*\n${{ github.event.pull_request.user.login }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.head_ref }}" },
                  { "type": "mrkdwn", "text": "*Status:*\n${{ steps.vercel.outputs.state || 'deploying' }}" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔍 Preview" },
                    "url": "https://${{ steps.vercel.outputs.url || 'micelio-nine.vercel.app' }}"
                  },
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "📝 PR" },
                    "url": "${{ github.event.pull_request.html_url }}"
                  },
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "📋 Vercel" },
                    "url": "https://vercel.com/gonzalos-projects-42c4ae43/micelio"
                  }
                ]
              }
            ]
          }
          PAYLOAD
          )"

  notify-slack-prod:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Get Vercel deployment
        id: vercel
        run: |
          sleep 30
          DEPLOY=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=production" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | jq -r '.deployments[0]')
          echo "url=$(echo $DEPLOY | jq -r '.url')" >> $GITHUB_OUTPUT
          echo "state=$(echo $DEPLOY | jq -r '.state // .readyState')" >> $GITHUB_OUTPUT

      - name: Notify Slack (production)
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<'PAYLOAD'
          {
            "channel": "C0APZ38637W",
            "text": "🚀 *Micelio deployed to production*",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🚀 Micelio — Production Deploy" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                  { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                  { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" },
                  { "type": "mrkdwn", "text": "*Status:*\n${{ steps.vercel.outputs.state || 'deploying' }}" }
                ]
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "*Message:* ${{ github.event.head_commit.message }}" }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🌐 Production" },
                    "url": "https://micelio.skyw.app"
                  },
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "🔍 Preview" },
                    "url": "https://${{ steps.vercel.outputs.url || 'micelio-nine.vercel.app' }}"
                  },
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "📋 Vercel Dashboard" },
                    "url": "https://vercel.com/gonzalos-projects-42c4ae43/micelio"
                  }
                ]
              }
            ]
          }
          PAYLOAD
          )"

  e2e:
    runs-on: ubuntu-latest
    needs: [check]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      BASE_URL: http://localhost:3001
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build app
        run: pnpm build
      - name: Run E2E tests (Chromium)
        run: pnpm exec playwright test --project=local
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            test-results/
            tests/reports/
            tests/test-results.json
            tests/junit.xml
          retention-days: 7
